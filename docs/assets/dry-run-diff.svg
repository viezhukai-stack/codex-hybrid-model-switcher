<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Guarded dry-run diff demo</title>
  <desc id="desc">A redacted terminal-style preview showing a safe Codex provider switch diff.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="48%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1000" cy="120" r="86" fill="#22c55e" opacity="0.12"/>
  <circle cx="180" cy="560" r="120" fill="#38bdf8" opacity="0.10"/>
  <g filter="url(#shadow)">
    <rect x="110" y="78" width="980" height="520" rx="24" fill="#0b1220" stroke="#334155" stroke-width="2"/>
    <rect x="110" y="78" width="980" height="64" rx="24" fill="#111827"/>
    <rect x="110" y="118" width="980" height="24" fill="#111827"/>
    <circle cx="148" cy="111" r="9" fill="#ef4444"/>
    <circle cx="176" cy="111" r="9" fill="#f59e0b"/>
    <circle cx="204" cy="111" r="9" fill="#22c55e"/>
    <text x="240" y="118" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">guarded-switch cloud-gpt-main --dry-run</text>
    <text x="144" y="184" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">Dry run: no files changed, no backup created.</text>
    <text x="144" y="224" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19">--- config.toml (current)</text>
    <text x="144" y="258" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19">+++ config.toml (planned)</text>
    <rect x="134" y="282" width="922" height="42" rx="8" fill="#450a0a" opacity="0.76"/>
    <text x="154" y="309" fill="#fecaca" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">- model_provider = "openai"</text>
    <rect x="134" y="330" width="922" height="42" rx="8" fill="#450a0a" opacity="0.76"/>
    <text x="154" y="357" fill="#fecaca" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">- model = "gpt-5.5"</text>
    <rect x="134" y="378" width="922" height="42" rx="8" fill="#052e16" opacity="0.82"/>
    <text x="154" y="405" fill="#bbf7d0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">+ model_provider = "custom"</text>
    <rect x="134" y="426" width="922" height="42" rx="8" fill="#052e16" opacity="0.82"/>
    <text x="154" y="453" fill="#bbf7d0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">+ model = "provider-gpt-main"</text>
    <text x="144" y="505" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">[model_providers.custom]</text>
    <text x="144" y="542" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">base_url = "&lt;redacted&gt;"</text>
  </g>
  <g>
    <rect x="790" y="515" width="252" height="50" rx="25" fill="#f8fafc"/>
    <text x="820" y="548" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700">Preview before apply</text>
  </g>
</svg>
